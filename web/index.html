<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoonLan</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <span class="moon" aria-hidden="true"></span>
      <h1>MoonLan</h1>
      <span class="tagline" data-i18n="tagline"></span>
    </div>
    <div class="toolbar">
      <span id="scan-status" class="status"></span>
      <span class="lang-switch" role="group" aria-label="Language">
        <button id="lang-ru">RU</button><button id="lang-en">EN</button>
      </span>
      <button id="alarms-btn"><span data-i18n="alarmsBtn"></span><span id="alarms-badge" class="badge hidden"></span></button>
      <button id="journal-btn" data-i18n="journalBtn"></button>
      <button id="rescan" data-i18n="rescanBtn"></button>
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <input id="search" type="search" autocomplete="off">
      <section>
        <h2><span data-i18n="switchesHeader"></span> <span id="switch-count" class="count"></span></h2>
        <ul id="switch-list" class="device-list"></ul>
      </section>
      <section>
        <h2><span data-i18n="devicesHeader"></span> <span id="host-count" class="count"></span></h2>
        <ul id="host-list" class="device-list"></ul>
      </section>
    </aside>

    <section id="map-panel">
      <div id="network"></div>
      <div id="details" class="hidden">
        <button id="details-close">×</button>
        <div id="details-body"></div>
      </div>
      <div id="journal" class="hidden">
        <button id="journal-close">×</button>
        <h3 data-i18n="journalTitle"></h3>
        <ul id="journal-list"></ul>
      </div>
      <div id="ports" class="hidden">
        <button id="ports-close">×</button>
        <h3 id="ports-title"></h3>
        <table class="ports-table">
          <thead>
            <tr>
              <th data-i18n="colPort"></th>
              <th></th>
              <th data-i18n="colSpeed"></th>
              <th class="num" data-i18n="colIn"></th>
              <th class="num" data-i18n="colOut"></th>
              <th class="num" data-i18n="colErr"></th>
              <th class="num" data-i18n="colDisc"></th>
            </tr>
          </thead>
          <tbody id="ports-body"></tbody>
        </table>
      </div>
      <div id="alarms" class="hidden">
        <button id="alarms-close">×</button>
        <h3 data-i18n="alarmsTitle"></h3>
        <div id="alarms-body"></div>
      </div>
      <div id="empty-state" class="hidden">
        <p data-i18n="emptyLine1"></p>
        <p data-i18n-html="emptyLine2"></p>
      </div>
    </section>
  </main>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
