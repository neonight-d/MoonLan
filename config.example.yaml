# MoonLan — example configuration.
# Copy to config.yaml and edit for your network.
# MoonLan — пример конфигурации.
# Скопируйте в config.yaml и отредактируйте под свою сеть.

listen:
  host: 0.0.0.0     # address the web UI listens on
                    # на каком адресе слушать веб-интерфейс
  port: 8080

snmp:
  community: public # SNMP v2c community (read-only)
                    # SNMP v2c community (только чтение)
  timeout: 2        # seconds to wait for a reply
                    # секунд на ответ
  retries: 1

# IP addresses of managed switches
# IP-адреса управляемых коммутаторов
switches:
  - 192.168.1.2
  - 192.168.1.3

# Devices with an ARP table (routers, L3 switches) —
# MoonLan learns host IPs from them by MAC
# Устройства с ARP-таблицей (маршрутизаторы, L3-коммутаторы) —
# из них MoonLan узнаёт IP-адреса хостов по их MAC
routers:
  - 192.168.1.1

# Periodic scan, minutes (0 — manual only via /api/scan)
# Периодический автоопрос, минут (0 — только вручную через /api/scan)
scan_interval_minutes: 10

# How often to ping hosts and switches, seconds
# Как часто пинговать хосты и коммутаторы, секунд
ping_interval_seconds: 60

# How often to poll port traffic/error counters, seconds
# Как часто опрашивать счётчики трафика и ошибок портов, секунд
counters_interval_seconds: 60

# Database file (hosts, event journal)
# Файл базы данных (хосты, журнал событий)
db_path: moonlan.db

# If more hosts than this are found behind one (non-uplink) port,
# a "switch without SNMP" node is drawn (0 — disable)
# Если на порту (не магистральном) найдено больше стольких хостов,
# на схеме рисуется «коммутатор без SNMP» (0 — отключить)
unmanaged_threshold: 3

# Alarm host_down only for hosts marked "Monitor" in the UI.
# true = old behavior: every host raises host_down.
# host_down только для хостов с флагом «Наблюдать» в интерфейсе.
# true = старое поведение: тревога по каждому хосту.
monitored_by_default: false

# Alarm thresholds / Пороги тревог
thresholds:
  errors_per_minute: 10          # port_errors: (errors+discards)/min
  port_utilization_percent: 90   # port_util: % of the link speed
                                 # (for a LAG — of the total speed)
                                 # % от скорости линка (для LAG — от суммарной)
  mass_down_hosts: 3             # port_hosts_down: hosts of one port gone
                                 # silent in one ping cycle (0 — disable)
                                 # хостов одного порта, замолчавших за один
                                 # ping-цикл (0 — отключить)

# Notification channels. Keep the real config.yaml (with passwords and
# tokens) OUT of git — it is listed in .gitignore.
# Каналы уведомлений. Храните боевой config.yaml (с паролями и токенами)
# ВНЕ git — он указан в .gitignore.
notifications:
  cooldown_seconds: 300      # anti-spam per (type, subject)
                             # антиспам на (тип, объект)
  # Flap damping: this many raises of one subject within the window
  # mute its notifications until it stays quiet for flap_quiet_seconds
  # Подавление флаппинга: столько подъёмов одного субъекта за окно
  # глушат его уведомления до flap_quiet_seconds тишины
  flap_count: 3
  flap_window_seconds: 7200
  flap_quiet_seconds: 3600
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    starttls: true
    username: ""
    password: ""
    mail_from: moonlan@example.com
    mail_to: [admin@example.com]
  telegram:
    enabled: false
    bot_token: ""              # Bot API token from @BotFather
    chat_ids: []               # e.g. [123456789]
  syslog:
    enabled: false
    host: 127.0.0.1
    port: 514

# Which alarm types go to which channels
# Какие типы тревог в какие каналы отправлять
alarm_notify:
  host_down: [email, telegram, syslog]
  switch_down: [email, telegram, syslog]
  port_errors: [syslog]
  port_util: [telegram, syslog]
  new_mac: [syslog]
  port_hosts_down: [email, telegram, syslog]
  lag_degraded: [telegram, syslog]
